name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gateway:
    name: Device Gateway (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/device-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/device-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

  admin-web:
    name: Admin Web (React / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build
