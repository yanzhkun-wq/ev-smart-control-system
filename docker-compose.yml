services:
  # ============================================
  # 设备网关 —— 接收硬件 JT/T808 数据
  # 端口：7611（TCP 设备接入）/ 7612（HTTP API）
  # ============================================
  gateway:
    build:
      context: ./services/device-gateway
      dockerfile: Dockerfile
    container_name: ev-gateway
    restart: always
    ports:
      - "7611:7611"  # 硬件 TCP 长连接（公网务必放行）
      - "7612:7612"  # HTTP API（内网调用，建议不暴露公网）
    environment:
      - DATA_DIR=/data
      - GATEWAY_PORT=7611
      - HTTP_PORT=7612
      - REGISTER_AUTH_CODE=${REGISTER_AUTH_CODE}
      - WECHAT_MP_APPID=${WECHAT_MP_APPID}
      - WECHAT_MP_SECRET=${WECHAT_MP_SECRET}
    volumes:
      - gateway_data:/data
    networks:
      - ev-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7612/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ============================================
  # 管理后台 —— Web 管理界面（Nginx 静态站点）
  # 端口：80
  # ============================================
  admin:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: ev-admin
    restart: always
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - ev-net

volumes:
  gateway_data:

networks:
  ev-net:
    driver: bridge
